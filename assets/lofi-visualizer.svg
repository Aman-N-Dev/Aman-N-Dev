<svg width="320" height="60" viewBox="0 0 320 60" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="lofi" x1="0" x2="1">
      <stop offset="0%" stop-color="#a18cd1"/>
      <stop offset="50%" stop-color="#fbc2eb"/>
      <stop offset="100%" stop-color="#fad0c4"/>
    </linearGradient>
  </defs>

  <!-- Bars -->
  <rect x="10"  y="30" width="6" height="20" fill="url(#lofi)">
    <animate attributeName="height" values="10;40;20;35;15" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="40;10;30;15;35" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="30"  y="25" width="6" height="25" fill="url(#lofi)">
    <animate attributeName="height" values="20;35;15;40;25" dur="1.0s" repeatCount="indefinite"/>
    <animate attributeName="y" values="35;15;35;10;25" dur="1.0s" repeatCount="indefinite"/>
  </rect>

  <rect x="50"  y="20" width="6" height="30" fill="url(#lofi)">
    <animate attributeName="height" values="30;15;40;20;35" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="20;35;10;30;15" dur="1.4s" repeatCount="indefinite"/>
  </rect>

  <rect x="70"  y="28" width="6" height="22" fill="url(#lofi)">
    <animate attributeName="height" values="15;30;25;40;20" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="35;20;25;10;30" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <rect x="90"  y="18" width="6" height="32" fill="url(#lofi)">
    <animate attributeName="height" values="25;40;20;35;30" dur="1.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="25;10;30;15;20" dur="1.3s" repeatCount="indefinite"/>
  </rect>

  <rect x="110" y="26" width="6" height="24" fill="url(#lofi)">
    <animate attributeName="height" values="20;25;40;15;30" dur="1.0s" repeatCount="indefinite"/>
    <animate attributeName="y" values="30;25;10;35;20" dur="1.0s" repeatCount="indefinite"/>
  </rect>

  <rect x="130" y="22" width="6" height="28" fill="url(#lofi)">
    <animate attributeName="height" values="35;20;25;40;15" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="15;30;25;10;35" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="150" y="30" width="6" height="20" fill="url(#lofi)">
    <animate attributeName="height" values="10;35;20;30;25" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="40;15;30;20;25" dur="1.1s" repeatCount="indefinite"/>
  </rect>

</svg>
